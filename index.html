<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>TataKamera — SMKN Ile Boleng</title>
<link rel="manifest" href="manifest.json">
<style>
/* ============================================
   CSS VARIABLES & RESET
   ============================================ */
:root {
  --primary: #6C63FF;
  --primary-dark: #5A52D5;
  --primary-light: #8B83FF;
  --secondary: #FF6584;
  --accent: #00D2FF;
  --bg-dark: #0F0E17;
  --bg-card: #1A1A2E;
  --bg-card-hover: #222244;
  --bg-surface: #16213E;
  --text-primary: #EAEAEA;
  --text-secondary: #A0A0B0;
  --text-muted: #6C6C80;
  --success: #00C853;
  --warning: #FFB300;
  --danger: #FF5252;
  --radius: 16px;
  --radius-sm: 10px;
  --radius-xs: 6px;
  --shadow: 0 8px 32px rgba(0,0,0,0.3);
  --shadow-sm: 0 4px 16px rgba(0,0,0,0.2);
  --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font);
  background: var(--bg-dark);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ============================================
   SCROLLBAR
   ============================================ */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-dark); }
::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 3px; }

/* ============================================
   UTILITY CLASSES
   ============================================ */
.hidden { display: none !important; }
.flex { display: flex; }
.flex-col { flex-direction: column; }
.items-center { align-items: center; }
.justify-center { justify-content: center; }
.justify-between { justify-content: space-between; }
.gap-1 { gap: 8px; }
.gap-2 { gap: 16px; }
.gap-3 { gap: 24px; }
.w-full { width: 100%; }
.text-center { text-align: center; }
.mt-1 { margin-top: 8px; }
.mt-2 { margin-top: 16px; }
.mt-3 { margin-top: 24px; }
.mb-2 { margin-bottom: 16px; }
.p-2 { padding: 16px; }
.p-3 { padding: 24px; }

/* ============================================
   ANIMATIONS
   ============================================ */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(40px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}
@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}
.animate-fade { animation: fadeIn 0.5s ease-out; }
.animate-slide { animation: slideUp 0.6s ease-out; }

/* ============================================
   BUTTONS
   ============================================ */
.btn {
  padding: 12px 28px;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  text-decoration: none;
  font-family: var(--font);
}
.btn-primary {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white;
  box-shadow: 0 4px 15px rgba(108,99,255,0.4);
}
.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(108,99,255,0.6);
}
.btn-secondary {
  background: var(--bg-card);
  color: var(--text-primary);
  border: 1px solid rgba(255,255,255,0.1);
}
.btn-secondary:hover { background: var(--bg-card-hover); }
.btn-danger {
  background: linear-gradient(135deg, var(--danger), #D32F2F);
  color: white;
}
.btn-success {
  background: linear-gradient(135deg, var(--success), #00A844);
  color: white;
}
.btn-sm { padding: 8px 16px; font-size: 13px; }
.btn-block { width: 100%; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* ============================================
   FORM ELEMENTS
   ============================================ */
.form-group { margin-bottom: 20px; }
.form-group label {
  display: block;
  margin-bottom: 8px;
  font-size: 14px;
  font-weight: 500;
  color: var(--text-secondary);
}
.form-input {
  width: 100%;
  padding: 14px 18px;
  background: var(--bg-surface);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-size: 15px;
  transition: var(--transition);
  font-family: var(--font);
}
.form-input:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(108,99,255,0.2);
}
.form-input::placeholder { color: var(--text-muted); }
textarea.form-input { min-height: 100px; resize: vertical; }
select.form-input { cursor: pointer; }

/* ============================================
   CARDS
   ============================================ */
.card {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 24px;
  border: 1px solid rgba(255,255,255,0.05);
  transition: var(--transition);
}
.card:hover {
  border-color: rgba(108,99,255,0.3);
  transform: translateY(-2px);
  box-shadow: var(--shadow);
}
.card-flat { border: none; }
.card-flat:hover { transform: none; }

/* ============================================
   PROGRESS BAR
   ============================================ */
.progress-bar {
  height: 8px;
  background: rgba(255,255,255,0.1);
  border-radius: 4px;
  overflow: hidden;
  position: relative;
}
.progress-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  background: linear-gradient(90deg, var(--primary), var(--accent));
}
.progress-text {
  font-size: 13px;
  color: var(--text-secondary);
  margin-top: 6px;
}

/* ============================================
   LOGIN / SIGNUP SCREEN
   ============================================ */
#auth-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  background: linear-gradient(135deg, #0F0E17 0%, #1A1A2E 50%, #16213E 100%);
  position: relative;
  overflow: hidden;
}
#auth-screen::before {
  content: '';
  position: absolute;
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(108,99,255,0.15), transparent 70%);
  top: -100px; right: -100px;
  border-radius: 50%;
}
#auth-screen::after {
  content: '';
  position: absolute;
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(255,101,132,0.1), transparent 70%);
  bottom: -50px; left: -50px;
  border-radius: 50%;
}
.auth-container {
  width: 100%;
  max-width: 420px;
  position: relative;
  z-index: 1;
}
.auth-logo {
  text-align: center;
  margin-bottom: 40px;
}
.auth-logo .logo-icon {
  width: 72px; height: 72px;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  margin: 0 auto 16px;
  box-shadow: 0 8px 32px rgba(108,99,255,0.3);
}
.auth-logo h1 {
  font-size: 28px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--text-primary), var(--primary-light));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.auth-logo p { color: var(--text-secondary); font-size: 14px; margin-top: 4px; }
.auth-card {
  background: rgba(26,26,46,0.8);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius);
  padding: 32px;
  box-shadow: var(--shadow);
}
.auth-tabs {
  display: flex;
  background: var(--bg-surface);
  border-radius: var(--radius-sm);
  padding: 4px;
  margin-bottom: 28px;
}
.auth-tab {
  flex: 1;
  padding: 10px;
  text-align: center;
  border-radius: var(--radius-xs);
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  color: var(--text-muted);
  transition: var(--transition);
  border: none;
  background: none;
  font-family: var(--font);
}
.auth-tab.active {
  background: var(--primary);
  color: white;
}
.auth-msg {
  padding: 12px 16px;
  border-radius: var(--radius-xs);
  font-size: 13px;
  margin-bottom: 16px;
  display: none;
}
.auth-msg.error { display: block; background: rgba(255,82,82,0.15); color: var(--danger); border: 1px solid rgba(255,82,82,0.3); }
.auth-msg.success { display: block; background: rgba(0,200,83,0.15); color: var(--success); border: 1px solid rgba(0,200,83,0.3); }
.auth-msg.info { display: block; background: rgba(108,99,255,0.15); color: var(--primary-light); border: 1px solid rgba(108,99,255,0.3); }

/* ============================================
   APP LAYOUT
   ============================================ */
#app-screen { display: none; min-height: 100vh; }
.app-header {
  background: rgba(15,14,23,0.95);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-left { display: flex; align-items: center; gap: 12px; }
.header-logo {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}
.header-title { font-size: 18px; font-weight: 700; }
.header-right { display: flex; align-items: center; gap: 12px; }
.header-user {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 14px;
  background: var(--bg-card);
  border-radius: 20px;
  font-size: 13px;
  cursor: pointer;
}
.header-avatar {
  width: 28px; height: 28px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
}
.btn-logout {
  background: none;
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--text-secondary);
  padding: 6px 14px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 13px;
  transition: var(--transition);
}
.btn-logout:hover { border-color: var(--danger); color: var(--danger); }

/* ============================================
   BOTTOM NAVIGATION (Mobile)
   ============================================ */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0; right: 0;
  background: rgba(15,14,23,0.98);
  backdrop-filter: blur(20px);
  border-top: 1px solid rgba(255,255,255,0.06);
  display: flex;
  padding: 8px 16px;
  padding-bottom: calc(8px + env(safe-area-inset-bottom));
  z-index: 100;
}
.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 8px 4px;
  cursor: pointer;
  border: none;
  background: none;
  color: var(--text-muted);
  font-size: 11px;
  font-family: var(--font);
  transition: var(--transition);
  border-radius: var(--radius-xs);
}
.nav-item.active { color: var(--primary); }
.nav-item .nav-icon { font-size: 22px; }
.nav-item .nav-badge {
  position: absolute;
  top: 2px; right: 50%;
  transform: translateX(14px);
  background: var(--danger);
  color: white;
  font-size: 10px;
  width: 16px; height: 16px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ============================================
   MAIN CONTENT
   ============================================ */
.main-content {
  padding: 24px;
  padding-bottom: 100px;
  max-width: 1200px;
  margin: 0 auto;
}
.page-title {
  font-size: 26px;
  font-weight: 700;
  margin-bottom: 8px;
}
.page-subtitle {
  color: var(--text-secondary);
  font-size: 14px;
  margin-bottom: 24px;
}

/* ============================================
   STUDENT DASHBOARD
   ============================================ */
.welcome-banner {
  background: linear-gradient(135deg, var(--primary), #4A3FC7);
  border-radius: var(--radius);
  padding: 32px;
  margin-bottom: 24px;
  position: relative;
  overflow: hidden;
}
.welcome-banner::after {
  content: '🎬';
  position: absolute;
  right: 24px; top: 50%;
  transform: translateY(-50%);
  font-size: 64px;
  opacity: 0.3;
}
.welcome-banner h2 { font-size: 22px; margin-bottom: 8px; }
.welcome-banner p { color: rgba(255,255,255,0.8); font-size: 14px; }
.overall-progress {
  margin-top: 20px;
  background: rgba(255,255,255,0.15);
  border-radius: 8px;
  padding: 16px;
}
.overall-progress .progress-bar { background: rgba(255,255,255,0.2); height: 10px; }
.overall-progress .progress-fill {
  background: linear-gradient(90deg, #00D2FF, #00FF88);
}
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}
.stat-card {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 20px;
  text-align: center;
  border: 1px solid rgba(255,255,255,0.05);
}
.stat-icon { font-size: 28px; margin-bottom: 8px; }
.stat-value { font-size: 24px; font-weight: 700; }
.stat-label { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }

/* Module Cards */
.module-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
}
.module-card {
  background: var(--bg-card);
  border-radius: var(--radius);
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.05);
  cursor: pointer;
  transition: var(--transition);
}
.module-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow);
  border-color: rgba(108,99,255,0.3);
}
.module-thumb {
  height: 140px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 48px;
  position: relative;
}
.module-thumb .module-badge {
  position: absolute;
  top: 12px; right: 12px;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
}
.module-badge.completed { background: rgba(0,200,83,0.2); color: var(--success); }
.module-badge.in-progress { background: rgba(108,99,255,0.2); color: var(--primary-light); }
.module-badge.locked { background: rgba(255,255,255,0.1); color: var(--text-muted); }
.module-info { padding: 20px; }
.module-info h3 { font-size: 16px; margin-bottom: 6px; }
.module-info p { font-size: 13px; color: var(--text-secondary); margin-bottom: 12px; }
.module-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12px;
  color: var(--text-muted);
}

/* ============================================
   MODULE DETAIL / LESSON VIEW
   ============================================ */
.lesson-view { max-width: 800px; margin: 0 auto; }
.lesson-header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 24px;
}
.btn-back {
  background: var(--bg-card);
  border: none;
  color: var(--text-primary);
  width: 40px; height: 40px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 18px;
  transition: var(--transition);
}
.btn-back:hover { background: var(--bg-card-hover); }
.lesson-content {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 32px;
  border: 1px solid rgba(255,255,255,0.05);
  line-height: 1.8;
  font-size: 15px;
}
.lesson-content h2 { font-size: 22px; margin: 24px 0 12px; color: var(--primary-light); }
.lesson-content h3 { font-size: 18px; margin: 20px 0 10px; color: var(--accent); }
.lesson-content h4 { font-size: 16px; margin: 16px 0 8px; }
.lesson-content ul, .lesson-content ol { padding-left: 24px; margin: 12px 0; }
.lesson-content li { margin-bottom: 8px; }
.lesson-content .info-box {
  background: rgba(108,99,255,0.1);
  border-left: 4px solid var(--primary);
  padding: 16px 20px;
  border-radius: 0 var(--radius-xs) var(--radius-xs) 0;
  margin: 16px 0;
}
.lesson-content .gear-box {
  background: rgba(0,210,255,0.1);
  border-left: 4px solid var(--accent);
  padding: 16px 20px;
  border-radius: 0 var(--radius-xs) var(--radius-xs) 0;
  margin: 16px 0;
}
.lesson-content .warning-box {
  background: rgba(255,179,0,0.1);
  border-left: 4px solid var(--warning);
  padding: 16px 20px;
  border-radius: 0 var(--radius-xs) var(--radius-xs) 0;
  margin: 16px 0;
}
.lesson-content table {
  width: 100%;
  border-collapse: collapse;
  margin: 16px 0;
  font-size: 14px;
}
.lesson-content th, .lesson-content td {
  padding: 10px 14px;
  text-align: left;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.lesson-content th {
  background: var(--bg-surface);
  color: var(--primary-light);
  font-weight: 600;
}
.lesson-nav {
  display: flex;
  justify-content: space-between;
  margin-top: 24px;
  gap: 16px;
}

/* ============================================
   ASSESSMENT
   ============================================ */
.quiz-container { max-width: 700px; margin: 0 auto; }
.quiz-question {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 28px;
  margin-bottom: 20px;
  border: 1px solid rgba(255,255,255,0.05);
}
.quiz-question h3 { font-size: 16px; margin-bottom: 16px; line-height: 1.6; }
.quiz-option {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 18px;
  background: var(--bg-surface);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius-sm);
  margin-bottom: 10px;
  cursor: pointer;
  transition: var(--transition);
  font-size: 14px;
}
.quiz-option:hover { border-color: var(--primary); background: rgba(108,99,255,0.1); }
.quiz-option.selected { border-color: var(--primary); background: rgba(108,99,255,0.15); }
.quiz-option.correct { border-color: var(--success); background: rgba(0,200,83,0.15); }
.quiz-option.wrong { border-color: var(--danger); background: rgba(255,82,82,0.15); }
.quiz-radio {
  width: 20px; height: 20px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.quiz-option.selected .quiz-radio {
  border-color: var(--primary);
  background: var(--primary);
}
.quiz-progress {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 24px;
}
.quiz-progress-text { font-size: 14px; color: var(--text-secondary); white-space: nowrap; }

/* ============================================
   ADMIN DASHBOARD
   ============================================ */
.admin-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 20px;
  margin-bottom: 30px;
}
.admin-stat {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 24px;
  border: 1px solid rgba(255,255,255,0.05);
}
.admin-stat .stat-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.admin-stat .stat-icon-bg {
  width: 44px; height: 44px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
}
.admin-section {
  margin-bottom: 30px;
}
.admin-section h3 {
  font-size: 18px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.data-table {
  width: 100%;
  border-collapse: collapse;
  background: var(--bg-card);
  border-radius: var(--radius);
  overflow: hidden;
}
.data-table th, .data-table td {
  padding: 14px 18px;
  text-align: left;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  font-size: 14px;
}
.data-table th {
  background: var(--bg-surface);
  color: var(--text-secondary);
  font-weight: 600;
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.data-table tr:hover td { background: rgba(255,255,255,0.02); }
.badge {
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
}
.badge-pending { background: rgba(255,179,0,0.2); color: var(--warning); }
.badge-active { background: rgba(0,200,83,0.2); color: var(--success); }
.badge-rejected { background: rgba(255,82,82,0.2); color: var(--danger); }
.table-scroll { overflow-x: auto; border-radius: var(--radius); }

/* ============================================
   MODULE EDITOR (Admin)
   ============================================ */
.editor-toolbar {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 12px;
  background: var(--bg-surface);

// DATABASE - IndexedDB Wrapper
// ============================================
const DB_NAME = 'TataKameraDB';
const DB_VERSION = 3;
let db;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('users')) {
        const s = d.createObjectStore('users', { keyPath: 'username' });
        s.createIndex('role', 'role');
        s.createIndex('status', 'status');
      }
      if (!d.objectStoreNames.contains('progress')) {
        const s = d.createObjectStore('progress', { keyPath: 'id' });
        s.createIndex('username', 'username');
      }
      if (!d.objectStoreNames.contains('assessments')) {
        const s = d.createObjectStore('assessments', { keyPath: 'id' });
        s.createIndex('username', 'username');
      }
      if (!d.objectStoreNames.contains('modules')) {
        d.createObjectStore('modules', { keyPath: 'id' });
      }
    };
    req.onsuccess = (e) => { db = e.target.result; resolve(db); };
    req.onerror = (e) => reject(e.target.error);
  });
}

function dbPut(store, data) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readwrite');
    tx.objectStore(store).put(data);
    tx.oncomplete = () => resolve();
    tx.onerror = (e) => reject(e.target.error);
  });
}

function dbGet(store, key) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = (e) => reject(e.target.error);
  });
}

function dbGetAll(store) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = (e) => reject(e.target.error);
  });
}

function dbGetByIndex(store, indexName, value) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readonly');
    const idx = tx.objectStore(store).index(indexName);
    const req = idx.getAll(value);
    req.onsuccess = () => resolve(req.result);
    req.onerror = (e) => reject(e.target.error);
  });
}

function dbDelete(store, key) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readwrite');
    tx.objectStore(store).delete(key);
    tx.oncomplete = () => resolve();
    tx.onerror = (e) => reject(e.target.error);
  });
}

      content: `<h2>△ Segitiga Exposure</h2>

<div class="info-box">
<strong>📌 CP BSKP 046/2025:</strong><br>
Peserta didik mampu memahami dan menerapkan prinsip segitiga exposure (ISO, Aperture, Shutter Speed) untuk menghasilkan gambar dengan exposure yang tepat dalam berbagai kondisi pencahayaan.
</div>

<h3>A. Tiga Elemen Exposure</h3>

<h4>1. ISO (Sensitivitas Sensor)</h4>
<table>
<tr><th>ISO</th><th>Kondisi</th><th>Noise</th></tr>
<tr><td>100-400</td><td>Outdoor siang hari, studio dengan lighting baik</td><td>Minimal</td></tr>
<tr><td>400-1600</td><td>Indoor, golden hour, overcast</td><td>Sedikit</td></tr>
<tr><td>1600-6400</td><td>Low light, malam hari</td><td>Terlihat</td></tr>
<tr><td>6400+</td><td>Sangat gelap (hindari jika bisa)</td><td>Banyak</td></tr>
</table>
<p><strong>Tips:</strong> Sony A6600 memiliki performa ISO terbaik di antara gear kita — bisa digunakan hingga ISO 6400 dengan noise minimal.</p>

<h4>2. Aperture (Bukaan Diafragma)</h4>
<p>Diukur dalam f-stop: semakin <strong>kecil angka = bukaan besar = lebih banyak cahaya + depth of field dangkal</strong>.</p>
<table>
<tr><th>Aperture</th><th>DOF</th><th>Penggunaan</th></tr>
<tr><td>f/1.8</td><td>Sangat dangkal</td><td>Portrait, bokeh cinematography (gunakan lensa 50mm/35mm)</td></tr>
<tr><td>f/4-5.6</td><td>Sedang</td><td>General purpose, wawancara</td></tr>
<tr><td>f/8-11</td><td>Luas</td><td>Landscape, establishing shot, semua objek tajam</td></tr>
</table>

<div class="gear-box">
<strong>🔧 Praktikum:</strong>
<ul>
<li><strong>Canon 750D + 50mm f/1.8:</strong> Bandingkan hasil f/1.8 vs f/8 pada objek yang sama</li>
<li><strong>Sony A6600 + 35mm f/1.8:</strong> Shoot portrait dengan background blur</li>
<li>Catat perbedaan depth of field di setiap aperture</li>
</ul>
</div>

<h4>3. Shutter Speed</h4>
<p>Untuk video, gunakan <strong>180° Shutter Rule</strong>: shutter speed = 2x frame rate.</p>
<ul>
<li>24fps → 1/50 shutter speed</li>
<li>30fps → 1/60 shutter speed</li>
<li>60fps → 1/120 shutter speed</li>
</ul>

<div class="warning-box">
<strong>⚠️ Mengapa 180° Rule penting?</strong><br>
Shutter speed yang terlalu cepat (misal 1/500 di 24fps) menghasilkan gerakan yang "choppy" dan tidak natural. Shutter speed terlalu lambat menghasilkan gambar blur berlebihan.
</div>

<h3>B. Hubungan Tiga Elemen</h3>
<p>Ketiga elemen saling mempengaruhi. Jika kamu memperbesar aperture (lebih banyak cahaya), kamu perlu menurunkan ISO atau mempercepat shutter speed untuk menjaga exposure seimbang.</p>
<p><strong>Rumus sederhana:</strong> Jika satu elemen berubah 1 stop, kompensasi dengan mengubah elemen lain 1 stop ke arah berlawanan.</p>`

      content: `<h2>🔦 Three-Point Lighting</h2>

<div class="info-box">
<strong>📌 SKKNI Unit: Menentukan Variabel Pencahayaan (M.742010.008.01)</strong><br>
Peserta didik mampu merencanakan dan menerapkan skema pencahayaan standar industri, termasuk three-point lighting dan variasinya.
</div>

<h3>A. Komponen Three-Point Lighting</h3>

<h4>1. Key Light (Cahaya Utama)</h4>
<ul>
<li>Sumber cahaya <strong>paling dominan</strong></li>
<li>Biasanya diletakkan 30-45° dari axis kamera, sedikit di atas eye-level</li>
<li>Menentukan kontras dan dimensi utama wajah</li>
<li>Bisa hard (dramatic) atau soft (flattering)</li>
</ul>

<h4>2. Fill Light (Cahaya Pengisi)</h4>
<ul>
<li>Ditempatkan di sisi <strong>berlawanan</strong> dari key light</li>
<li>Intensitas lebih rendah dari key light (rasio 2:1 hingga 4:1)</li>
<li>Fungsi: mengisi bayangan yang diciptakan key light</li>
<li>Biasanya lebih soft dari key light</li>
</ul>

<h4>3. Back Light / Rim Light (Cahaya Belakang)</h4>
<ul>
<li>Ditempatkan di <strong>belakang</strong> subjek, menghadap kamera</li>
<li>Menciptakan garis terang di tepi subjek (rim)</li>
<li>Memisahkan subjek dari background, menambah dimensi 3D</li>
</ul>

<h3>B. Lighting Ratio</h3>
<table>
<tr><th>Rasio Key:Fill</th><th>Karakter</th><th>Penggunaan</th></tr>
<tr><td>1:1</td><td>Flat, minimal bayangan</td><td>Beauty, komersial, wawancara formal</td></tr>
<tr><td>2:1</td><td>Natural, sedikit dimensi</td><td>Dialog scene, corporate</td></tr>
<tr><td>4:1</td><td>Dramatis, kontras kuat</td><td>Drama, thriller</td></tr>
<tr><td>8:1+</td><td>Chiaroscuro, sangat dramatis</td><td>Film noir, horror</td></tr>
</table>

<h3>C. Skema Pencahayaan Lanjutan</h3>
<ul>
<li><strong>Rembrandt Lighting:</strong> Key light 45° samping + atas, menciptakan segitiga cahaya di pipi jauh dari key</li>
<li><strong>Butterfly Lighting:</strong> Key light di depan + atas subjek, bayangan kupu-kupu di bawah hidung</li>
<li><strong>Split Lighting:</strong> Key light 90° dari samping, setengah wajah terang + setengah gelap</li>
<li><strong>Loop Lighting:</strong> Key light sedikit di atas + samping, bayangan hidung jatuh ke pipi</li>

<li>Variasikan rasio key:fill (1:1, 2:1, 4:1)</li>
<li>Dokumentasikan setiap setup dengan foto diagram lighting</li>

<h3>A. Rule of Thirds</h3>
<p>Bayangkan frame dibagi menjadi 9 bagian sama besar oleh 2 garis horizontal dan 2 garis vertikal. Tempatkan subjek utama pada <strong>titik perpotongan</strong> atau sepanjang garis tersebut.</p>
<ul>
<li>Aktifkan grid overlay di kamera (tersedia di Canon 750D, Sony A6600, Nikon D5500)</li>
<li>Tempatkan mata subjek di garis 1/3 atas</li>
<li>Berikan "nose room" — ruang di depan arah pandang subjek</li>
<li>Berikan "head room" — sedikit ruang di atas kepala</li>
</ul>

<h3>B. Prinsip Komposisi Lainnya</h3>
<table>
<tr><th>Prinsip</th><th>Penjelasan</th><th>Penggunaan</th></tr>

<tr><td><strong>Framing within Frame</strong></td><td>Elemen di scene membingkai subjek</td><td>Pintu, jendela, lengkungan</td></tr>
<tr><td><strong>Symmetry</strong></td><td>Keseimbangan simetris yang pleasing</td><td>Arsitektur, formal, Wes Anderson style</td></tr>
<tr><td><strong>Depth Layering</strong></td><td>Foreground + midground + background</td><td>Menambah dimensi 3D dalam frame 2D</td></tr>
<tr><td><strong>Negative Space</strong></td><td>Ruang kosong di sekitar subjek</td><td>Isolasi, kesepian, emphasis</td></tr>
<tr><td><strong>Golden Ratio</strong></td><td>Spiral fibonacci dalam komposisi</td><td>Komposisi organik dan natural</td></tr>
</table>

<h3>C. Latar Depan & Latar Belakang</h3>
<div class="info-box">
<strong>📌 SKKNI Unit: Menentukan Latar Depan dan Latar Belakang (M.742010.006.01)</strong>
</div>
<ul>
<li><strong>Background:</strong> Pilih background yang mendukung cerita, hindari distraksi visual</li>
<li><strong>Foreground:</strong> Gunakan elemen foreground untuk menambah depth</li>

<li><strong>Practical lights:</strong> Lampu dalam frame (lampu meja, neon sign) menambah kedalaman visual</li>

<li><strong>Jarak ke subjek:</strong> Semakin dekat = DOF semakin dangkal</li>
<li><strong>Sensor size:</strong> Semakin besar (APS-C vs 1/2.5") = DOF semakin dangkal</li>
</ul>

<li>Rekam dalam 1080p 24fps, review hasilnya</li>

let currentUser = null;
let currentPage = 'dashboard';
let currentModule = null;
let currentLesson = null;
let modules = [];

// ============================================
// INITIALIZATION
// ============================================
async function initApp() {
  await openDB();
  // Seed admin account
  const admin = await dbGet('users', 'kiaose');
  if (!admin) {
    await dbPut('users', {
      username: 'kiaose',
      password: 'Admin#',
      name: 'Administrator',
      role: 'admin',
      status: 'active',
      createdAt: new Date().toISOString()
    });
  }
  // Seed default modules
  const existingMods = await dbGetAll('modules');
  if (existingMods.length === 0) {
    for (const mod of DEFAULT_MODULES) {
      await dbPut('modules', mod);
    }
  }
  // Check session
  const session = localStorage.getItem('tk_session');
  if (session) {
    const user = await dbGet('users', session);
    if (user && user.status === 'active') {
      currentUser = user;
      showApp();
      return;
    }
  }
  showAuth();
}

// ============================================
// AUTHENTICATION
// ============================================
function showAuth() {
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('app-screen').style.display = 'none';
}

function showApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
  updateHeader();
  renderNav();
  navigateTo('dashboard');
}

function switchAuthTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t, i) => {
    t.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'signup' && i === 1));
  });
  document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
  document.getElementById('signup-form').classList.toggle('hidden', tab !== 'signup');
  document.getElementById('auth-message').className = 'auth-msg';
}

function showAuthMsg(type, msg) {
  const el = document.getElementById('auth-message');
  el.className = 'auth-msg ' + type;
  el.textContent = msg;
}

async function handleLogin(e) {
  e.preventDefault();
  const username = document.getElementById('login-user').value.trim();
  const password = document.getElementById('login-pass').value;
  const user = await dbGet('users', username);
  if (!user || user.password !== password) {
    showAuthMsg('error', 'Username atau password salah!');
    return;
  }
  if (user.status === 'pending') {
    showAuthMsg('info', 'Akun Anda belum disetujui oleh Guru. Silakan hubungi Guru untuk aktivasi.');
    return;
  }
  if (user.status === 'rejected') {
    showAuthMsg('error', 'Akun Anda telah ditolak. Hubungi Guru untuk informasi lebih lanjut.');
    return;
  }
  currentUser = user;
  localStorage.setItem('tk_session', username);
  showApp();
}

async function handleSignup(e) {
  e.preventDefault();
  const name = document.getElementById('signup-name').value.trim();
  const username = document.getElementById('signup-user').value.trim();
  const password = document.getElementById('signup-pass').value;
  const password2 = document.getElementById('signup-pass2').value;
  if (password !== password2) {
    showAuthMsg('error', 'Password tidak cocok!');
    return;
  }
  if (username.length < 3) {
    showAuthMsg('error', 'Username minimal 3 karakter!');
    return;
  }
  const existing = await dbGet('users', username);
  if (existing) {
    showAuthMsg('error', 'Username sudah digunakan!');
    return;
  }
  await dbPut('users', {
    username,
    password,
    name,
    role: 'student',
    status: 'Active',
    createdAt: new Date().toISOString()
  });
  showAuthMsg('success', 'Pendaftaran berhasil! Silahkan login.');
  document.getElementById('signup-form').reset();
}

function handleLogout() {
  localStorage.removeItem('tk_session');
  currentUser = null;
  currentPage = 'dashboard';
  showAuth();
}

function updateHeader() {

function navigateTo(page) {
  currentPage = page;
  currentModule = null;
  currentLesson = null;
  document.querySelectorAll('.nav-item').forEach((item, i) => {
    const pages = currentUser.role === 'admin'
      ? ['dashboard', 'students', 'modules-admin', 'export']
      : ['dashboard', 'modules', 'glosary', 'progress'];
    item.classList.toggle('active', pages[i] === page);
  });
  renderPage();
}

async function renderPage() {
  const main = document.getElementById('main-content');
  modules = await dbGetAll('modules');

  if (currentUser.role === 'admin') {
    switch(currentPage) {
      case 'dashboard': await renderAdminDashboard(main); break;
      case 'students': await renderStudentManagement(main); break;
      case 'modules-admin': await renderModuleAdmin(main); break;
      case 'export': renderExport(main); break;
    }
  } else {
    switch(currentPage) {
      case 'dashboard': await renderStudentDashboard(main); break;
      case 'modules': await renderModuleList(main); break;
      case 'glossary': await renderGlossaryPage(main); break;  // ← TAMBAH BARIS INI
      case 'progress': await renderProgressPage(main); break;
      case 'module-detail': await renderModuleDetail(main); break;
      case 'lesson': await renderLessonView(main); break;
      case 'assessment': await renderAssessment(main); break;
    }
  }
  main.classList.add('animate-fade');
  setTimeout(() => main.classList.remove('animate-fade'), 500);
}

  const pct = totalLessons > 0 ? Math.round((completedLessons / totalLessons) * 100) : 0;

        <div class="stat-label">Asesmen Awal</div>

      <div class="stat-card">
        <div class="stat-icon">🏆</div>
        <div class="stat-value">${finalAssessment ? finalAssessment.score + '%' : '—'}</div>
        <div class="stat-label">Asesmen Akhir</div>

        <div class="stat-icon">${pct >= 100 ? '⭐' : '🔥'}</div>
        <div class="stat-value">${pct >= 100 ? 'Tuntas' : 'Berjalan'}</div>
        <div class="stat-label">Status</div>
      </div>
    </div>

    <h3 style="margin-bottom:16px;">📚 Lanjutkan Belajar</h3>
    <div class="module-grid">
      ${modules.slice(1, 6).map(mod => renderModuleCard(mod, progress)).join('')}
    </div>
  `;
}

function renderModuleCard(mod, progress) {
  const lessonsDone = mod.lessons ? mod.lessons.filter(l =>
    progress.some(p => p.lessonId === l.id && p.completed)
  ).length : 0;
  const total = mod.lessons ? mod.lessons.length : 0;
  const pct = total > 0 ? Math.round((lessonsDone / total) * 100) : 0;
  let badge = '';
  if (mod.type === 'assessment' || mod.type === 'assessment-final') {
    badge = '<span class="module-badge in-progress">Asesmen</span>';
  } else if (pct >= 100) {
    badge = '<span class="module-badge completed">✓ Selesai</span>';
  } else if (pct > 0) {
    badge = '<span class="module-badge in-progress">Sedang Berjalan</span>';
  }

  return `
    <div class="module-card" onclick="openModule('${mod.id}')">
      <div class="module-thumb" style="background:${mod.color}">
        <span>${mod.icon}</span>
        ${badge}
      </div>
      <div class="module-info">
        <h3>${mod.title}</h3>
        <p>${mod.description}</p>
        ${mod.type === 'module' ? `
          <div class="progress-bar" style="margin-bottom:8px;">
            <div class="progress-fill" style="width:${pct}%"></div>
          </div>
          <div class="module-meta">
            <span>${total} materi</span>
            <span>${pct}%</span>
          </div>
        ` : `
          <div class="module-meta"><span>Klik untuk memulai</span></div>
        `}
      </div>
    </div>
  `;
}

async function openModule(modId) {
  currentModule = modules.find(m => m.id === modId);
  if (!currentModule) return;
  if (currentModule.type === 'assessment') {
    currentPage = 'assessment';
    renderPage();
    return;
  }
  if (currentModule.type === 'assessment-final') {
    currentPage = 'assessment';
    renderPage();
    return;
  }
  currentPage = 'module-detail';
  renderPage();
}

let quizAnswers = {};
let quizType = '';

function startAssessment(type) {
  quizType = type;
  quizAnswers = {};
  const questions = type === 'baseline' ? BASELINE_QUESTIONS : FINAL_QUESTIONS;
  const main = document.getElementById('main-content');
  main.innerHTML = `
    <div class="quiz-container">
      <div class="quiz-progress">
        <div class="quiz-progress-text">0/${questions.length}</div>
        <div class="progress-bar" style="flex:1;"><div class="progress-fill" id="quiz-prog" style="width:0%"></div></div>
      </div>
      <div id="quiz-questions">
        ${questions.map((q, i) => `
          <div class="quiz-question" id="qq-${i}">
            <h3>${i+1}. ${q.q}</h3>
            ${q.options.map((opt, j) => `
              <div class="quiz-option" onclick="selectOption(${i},${j})" id="qo-${i}-${j}">
                <div class="quiz-radio"></div>
                <span>${opt}</span>
              </div>
            `).join('')}
          </div>
        `).join('')}
      </div>
      <div style="text-align:center;margin-top:24px;">
        <button class="btn btn-primary btn-block" onclick="submitAssessment()" id="btn-submit-quiz">📝 Kirim Jawaban</button>
      </div>
    </div>`;
}

function selectOption(qIdx, optIdx) {
  const questions = quizType === 'baseline' ? BASELINE_QUESTIONS : FINAL_QUESTIONS;
  questions[qIdx].options.forEach((_, j) => {
    document.getElementById(`qo-${qIdx}-${j}`).classList.remove('selected');
  });
  document.getElementById(`qo-${qIdx}-${optIdx}`).classList.add('selected');
  quizAnswers[qIdx] = optIdx;
  const answered = Object.keys(quizAnswers).length;
  document.querySelector('.quiz-progress-text').textContent = `${answered}/${questions.length}`;
  document.getElementById('quiz-prog').style.width = `${(answered/questions.length)*100}%`;
}

async function submitAssessment() {
  const questions = quizType === 'baseline' ? BASELINE_QUESTIONS : FINAL_QUESTIONS;
  const total = questions.length;
  const answered = Object.keys(quizAnswers).length;
  if (answered < total) {
    if (!confirm(`Anda baru menjawab ${answered} dari ${total} soal. Kirim sekarang?`)) return;
  }
  let correct = 0;
  questions.forEach((q, i) => {
    if (quizAnswers[i] === q.correct) correct++;
    q.options.forEach((_, j) => {
      const el = document.getElementById(`qo-${i}-${j}`);
      if (j === q.correct) el.classList.add('correct');
      else if (quizAnswers[i] === j) el.classList.add('wrong');
      el.style.pointerEvents = 'none';
    });
  });
  const score = Math.round((correct / total) * 100);
  await dbPut('assessments', {
    id: `${currentUser.username}_${quizType}`,
    username: currentUser.username,
    type: quizType,
    score, correct, total,
    answers: quizAnswers,
    completedAt: new Date().toISOString()
  });
  document.getElementById('btn-submit-quiz').outerHTML = `
    <div class="card" style="text-align:center;margin-top:24px;">
      <div style="font-size:48px;font-weight:700;color:${score >= 70 ? 'var(--success)' : 'var(--warning)'};">${score}%</div>
      <p style="margin:12px 0;">${correct} dari ${total} jawaban benar</p>

async function renderProgressPage(container) {

  container.innerHTML = `

async function approveUser(username) {
  const user = await dbGet('users', username);
  if (user) { user.status = 'active'; await dbPut('users', user); }
  showToast('success', `Akun ${username} telah disetujui!`);
  renderPage();
}

async function rejectUser(username) {
  if (!confirm(`Tolak akun ${username}?`)) return;
  const user = await dbGet('users', username);
  if (user) { user.status = 'rejected'; await dbPut('users', user); }
  showToast('info', `Akun ${username} telah ditolak.`);
  renderPage();
}

async function deleteUser(username) {
  if (!confirm(`Hapus akun ${username}?`)) return;
  await dbDelete('users', username);
  showToast('info', 'Akun dihapus.');
  renderPage();
}

async function resetProgress(username) {
  if (!confirm(`Reset progres ${username}? Data asesmen dan progres akan dihapus.`)) return;
  const progress = await dbGetByIndex('progress', 'username', username);
  const assessments = await dbGetByIndex('assessments', 'username', username);
  for (const p of progress) await dbDelete('progress', p.id);
  for (const a of assessments) await dbDelete('assessments', a.id);
  showToast('success', 'Progres direset.');
  renderPage();
}

async function exportCSV(type) {
  let csv = '';
  let filename = '';
  if (type === 'assessments') {
    const data = await dbGetAll('assessments');
    const users = await dbGetAll('users');
    csv = 'Nama,Username,Tipe,Skor,Benar,Total,Tanggal\n';
    data.forEach(d => {
      const u = users.find(x => x.username === d.username);
      csv += `"${u?u.name:d.username}",${d.username},${d.type},${d.score},${d.correct},${d.total},${d.completedAt}\n`;
    });
    filename = 'asesmen_tatakamera.csv';
  } else if (type === 'progress') {
    const data = await dbGetAll('progress');
    const users = await dbGetAll('users');
    csv = 'Nama,Username,LessonID,Selesai,Tanggal\n';
    data.forEach(d => {
      const u = users.find(x => x.username === d.username);
      csv += `"${u?u.name:d.username}",${d.username},${d.lessonId},${d.completed},${d.completedAt}\n`;
    });
    filename = 'progres_tatakamera.csv';
  } else {
    const users = (await dbGetAll('users')).filter(u => u.role === 'student');
    csv = 'Nama,Username,Status,Tanggal Daftar\n';
    users.forEach(u => { csv += `"${u.name}",${u.username},${u.status},${u.createdAt}\n`; });
    filename = 'siswa_tatakamera.csv';
  }
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = filename;
  link.click();
  showToast('success', `File ${filename} berhasil diunduh!`);
}

function saveGSheetURL() {
  const url = document.getElementById('gsheet-url').value.trim();
  localStorage.setItem('tk_gsheet_url', url);
  showToast('success', 'URL Google Sheet tersimpan!');
}

async function sendToGSheet() {
  const url = localStorage.getItem('tk_gsheet_url');
  if (!url) { showToast('error', 'URL Google Sheet belum diatur!'); return; }
  try {
    const assessments = await dbGetAll('assessments');
    const progress = await dbGetAll('progress');
    const users = (await dbGetAll('users')).filter(u => u.role === 'student');
    await fetch(url, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ assessments, progress, users, timestamp: new Date().toISOString() })
    });
    showToast('success', 'Data berhasil dikirim ke Google Sheet!');
  } catch(e) { showToast('error', 'Gagal mengirim: ' + e.message); }
}

// ============================================
// TOAST NOTIFICATION
// ============================================
function showToast(type, message) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const toast = document.createElement('div');
  toast.className = `toast toast-${type}`;
  toast.textContent = message;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3500);
}

  { term: 'K3 (Keselamatan & Kesehatan Kerja)', def: 'Standar prosedur keamanan di lokasi produksi — listrik, rigging, ergonomi, dan manajemen risiko.' },
  { term: 'Key Light', def: 'Sumber cahaya utama dan paling dominan dalam scene. Menentukan arah & karakter pencahayaan.' },
  { term: 'Leading Lines', def: 'Garis visual dalam frame yang mengarahkan mata penonton ke subjek utama.' },
  { term: 'Log (Picture Profile)', def: 'Profil gambar datar dengan dynamic range luas, memberi fleksibilitas color grading di pasca-produksi.' },
  { term: 'LUT (Look-Up Table)', def: 'File preset warna yang dipakai di color grading untuk mengonversi Log footage ke look tertentu.' },
  { term: 'Medium Shot (MS)', def: 'Ukuran shot dari pinggang ke atas, umum untuk dialog.' },
  { term: 'OIS (Optical Image Stabilization)', def: 'Stabilisasi di dalam lensa, mengurangi shake saat handheld.' },
  { term: 'Over-the-Shoulder (OTS)', def: 'Shot dialog dari belakang bahu karakter lain, memperlihatkan perspektif percakapan.' },
  { term: 'Pan', def: 'Pergerakan kamera horizontal (kiri-kanan) pada sumbu tripod.' },
  { term: 'Pasca-Produksi', def: 'Tahap setelah shooting: editing, color grading, sound mixing, dan finishing.' },
  { term: 'Pra-Produksi', def: 'Tahap perencanaan sebelum shooting: skenario, storyboard, recce, shot list, persiapan gear.' },
  { term: 'Produksi', def: 'Tahap pengambilan gambar di lokasi — semua scene direkam sesuai shot list.' },
  { term: 'Recce (Location Survey)', def: 'Survey lokasi sebelum hari shooting untuk merencanakan kamera, lighting, dan logistik.' },
  { term: 'Reflector', def: 'Papan pemantul cahaya (silver/gold/white) untuk mengisi bayangan tanpa lampu tambahan.' },
  { term: 'Rembrandt Lighting', def: 'Skema pencahayaan di mana segitiga cahaya terbentuk di pipi subjek yang jauh dari key light.' },
  { term: 'Resolution', def: 'Dimensi pixel gambar: 1080p (FHD), 4K (UHD), 8K. Semakin tinggi, semakin detail.' },
  { term: 'Rule of Thirds', def: 'Prinsip komposisi membagi frame menjadi 9 bagian, menempatkan subjek pada garis/titik perpotongan.' },
  { term: 'Shot List', def: 'Daftar semua shot yang akan direkam untuk setiap scene, lengkap dengan size, angle, dan gerakan.' },
  { term: 'Shutter Speed', def: 'Kecepatan rana kamera. Untuk video, gunakan 180° rule: shutter = 2× frame rate (mis. 24fps → 1/50).' },
  { term: 'Softbox', def: 'Modifier cahaya berbentuk kotak dengan diffuser, menghasilkan cahaya lembut dan merata.' },
  { term: 'Storyboard', def: 'Visualisasi frame-by-frame adegan dalam bentuk sketsa, sebagai panduan saat shooting.' },
  { term: 'Three-Point Lighting', def: 'Skema pencahayaan standar dengan 3 sumber: Key Light, Fill Light, dan Back Light.' },
  { term: 'Tilt', def: 'Pergerakan kamera vertikal (atas-bawah) pada sumbu tripod.' },
  { term: 'Tungsten', def: 'Jenis lampu incandescent dengan suhu warna 3200K (hangat/kuning).' },
  { term: 'White Balance', def: 'Pengaturan agar warna putih tampak putih sesuai sumber cahaya. Bisa auto, preset, atau manual Kelvin.' },
  { term: 'Wide Shot (WS)', def: 'Ukuran shot yang menampilkan seluruh tubuh subjek beserta lingkungannya.' },
  { term: 'Zoom', def: 'Perubahan focal length lensa tanpa kamera bergerak — mengubah ukuran subjek dalam frame.' },
  { term: '180° Shutter Rule', def: 'Aturan shutter speed di video: shutter = 2× frame rate, untuk motion blur natural.' }
];

async function renderGlossaryPage(container) {
  const sorted = [...GLOSSARY_DATA].sort((a, b) => a.term.localeCompare(b.term, 'id'));
  container.innerHTML = `
    <h2 class="page-title">📖 Glosarium</h2>
    <p class="page-subtitle">Daftar istilah Tata Kamera & Tata Cahaya (${sorted.length} istilah)</p>
    <input type="text" class="glossary-search" id="glossary-search" placeholder="🔎 Cari istilah..." oninput="filterGlossary(this.value)">
    <div id="glossary-list" style="display:flex;flex-direction:column;gap:10px;">
      ${sorted.map(g => `
        <div class="glossary-item" data-term="${g.term.toLowerCase()}" data-def="${g.def.toLowerCase()}">
          <div class="glossary-term">${g.term}</div>
          <div class="glossary-def">${g.def}</div>
        </div>
      `).join('')}
    </div>
    <div id="glossary-empty" class="hidden" style="text-align:center;padding:32px;color:var(--text-muted);">
      Tidak ada istilah yang cocok.
    </div>`;
}

function filterGlossary(keyword) {
  const q = keyword.trim().toLowerCase();
  const items = document.querySelectorAll('.glossary-item');
  let visible = 0;
  items.forEach(el => {
    const match = !q || el.dataset.term.includes(q) || el.dataset.def.includes(q);
    el.style.display = match ? '' : 'none';
    if (match) visible++;
  });
  document.getElementById('glossary-empty').classList.toggle('hidden', visible > 0);
}
initApp();
</script>
</body>
</html>
